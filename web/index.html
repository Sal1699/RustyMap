<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RustyMap Dashboard</title>
<style>
  :root {
    --bg:#0f172a; --card:#1e293b; --card-hi:#273449; --line:#334155;
    --fg:#e2e8f0; --mut:#94a3b8; --acc:#38bdf8;
    --open:#4ade80; --close:#f87171; --filt:#fbbf24; --info:#22d3ee;
    --crit:#fb7185; --high:#f59e0b; --warn:#facc15;
  }
  * { box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; margin:0; background:var(--bg); color:var(--fg); }
  header { padding:0.8em 1.5em; background:#0b1220; border-bottom:1px solid #1f2a44; display:flex; align-items:center; justify-content:space-between; }
  header h1 { margin:0; color:var(--acc); font-size:1.1em; letter-spacing:0.02em; }
  header .live { font-size:0.75em; color:var(--mut); }
  header .live::before { content:'●'; color:var(--open); margin-right:0.3em; }
  main { display:grid; grid-template-columns: 340px 1fr; gap:1em; padding:1em 1.5em; }
  @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
  .card { background:var(--card); border-radius:10px; padding:1em 1.1em; }
  h2 { margin-top:0; font-size:0.95em; color:var(--acc); text-transform:uppercase; letter-spacing:0.05em; }
  input.search { width:100%; padding:0.5em 0.7em; background:#0b1220; color:var(--fg); border:1px solid var(--line); border-radius:6px; margin-bottom:0.7em; font-size:0.9em; }
  input.search:focus { outline:none; border-color:var(--acc); }
  ul.scans { list-style:none; padding:0; margin:0; max-height: 78vh; overflow:auto; }
  ul.scans li { padding:0.55em 0.7em; border-radius:6px; cursor:pointer; margin-bottom:2px; }
  ul.scans li:hover { background:var(--card-hi); }
  ul.scans li.active { background:#334155; box-shadow: inset 3px 0 0 var(--acc); }
  ul.scans .row1 { display:flex; align-items:center; gap:0.4em; }
  ul.scans .id { font-weight:600; color:var(--fg); }
  ul.scans .smeta { color:var(--mut); font-size:0.78em; margin-top:0.2em; line-height:1.3; }
  .badge { display:inline-block; padding:0.05em 0.5em; border-radius:10px; font-size:0.7em; text-transform:uppercase; letter-spacing:0.05em; font-weight:600; }
  .badge.complete { background:#064e3b; color:#6ee7b7; }
  .badge.in_progress { background:#78350f; color:#fcd34d; }
  .badge.aborted { background:#7f1d1d; color:#fca5a5; }
  .badge.unknown { background:#334155; color:var(--mut); }
  .badge.scan-type { background:#1e3a8a; color:#bfdbfe; }
  .summary { display:flex; gap:1.2em; flex-wrap:wrap; margin-bottom:1em; padding:0.8em 1em; background:#0b1220; border-radius:6px; font-size:0.85em; }
  .summary .stat { display:flex; flex-direction:column; }
  .summary .stat .v { font-size:1.4em; color:var(--acc); font-weight:600; }
  .summary .stat .l { color:var(--mut); font-size:0.75em; text-transform:uppercase; letter-spacing:0.05em; }
  table { border-collapse:collapse; width:100%; font-size:0.88em; }
  th, td { padding:5px 10px; border-bottom:1px solid var(--line); text-align:left; }
  th { color:#cbd5e1; font-weight:600; font-size:0.8em; text-transform:uppercase; letter-spacing:0.04em; }
  tbody tr:hover { background:#273449; }
  .state-open { color:var(--open); font-weight:600; }
  .state-closed { color:var(--close); }
  .state-filtered { color:var(--filt); }
  .state-openfiltered, .state-open\|filtered { color:var(--info); }
  .state-unfiltered { color:#c084fc; }
  .host { margin-bottom:1.2em; padding:0.9em; background:#172033; border-radius:8px; }
  .host h3 { margin:0 0 0.4em; font-size:0.95em; font-family:ui-monospace, monospace; }
  .muted { color:var(--mut); font-size:0.82em; }
  .empty { color:var(--mut); padding:2em; text-align:center; }
  .pill { display:inline-block; padding:0.05em 0.45em; border-radius:4px; background:#334155; font-size:0.7em; margin-left:0.3em; }
</style>
</head>
<body>
<header>
  <h1>RustyMap Dashboard</h1>
  <span class="live" title="Updates every 10s">live</span>
</header>
<main>
  <section class="card">
    <h2>Scans</h2>
    <input class="search" id="search" placeholder="filter id, type, target…" autocomplete="off">
    <ul class="scans" id="scans"></ul>
  </section>
  <section class="card" id="detail">
    <h2>Scan detail</h2>
    <p class="empty">Select a scan from the list.</p>
  </section>
</main>
<script>
let allScans = [];
let activeId = null;

async function loadScans() {
  const res = await fetch('/api/scans');
  const data = await res.json();
  allScans = data.scans;
  renderScans();
}

function renderScans() {
  const q = (document.getElementById('search').value || '').toLowerCase().trim();
  const ul = document.getElementById('scans');
  ul.innerHTML = '';
  const filtered = allScans.filter(s => {
    if (!q) return true;
    return ('' + s.id).includes(q)
      || (s.scan_type || '').toLowerCase().includes(q)
      || (s.targets || '').toLowerCase().includes(q)
      || (s.status || '').toLowerCase().includes(q);
  });
  if (!filtered.length) {
    ul.innerHTML = '<li class="empty">No scans match.</li>';
    return;
  }
  for (const s of filtered) {
    const li = document.createElement('li');
    li.dataset.id = s.id;
    if (s.id === activeId) li.classList.add('active');
    const status = (s.status || 'unknown').replace(/[^a-z_]/gi,'_');
    li.innerHTML = `<div class="row1">
        <span class="id">#${s.id}</span>
        <span class="badge scan-type">${s.scan_type || '?'}</span>
        <span class="badge ${status}">${s.status || 'unknown'}</span>
      </div>
      <div class="smeta">${s.started_at}<br>${escape(s.targets)} <span class="pill">${escape(s.ports)}</span></div>`;
    li.onclick = () => selectScan(s.id);
    ul.appendChild(li);
  }
}

function escape(s) {
  return ('' + (s ?? '')).replace(/[&<>"]/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'
  }[c]));
}

async function selectScan(id) {
  activeId = id;
  document.querySelectorAll('ul.scans li').forEach(l => {
    l.classList.toggle('active', +l.dataset.id === id);
  });
  const res = await fetch('/api/scans/' + id);
  const data = await res.json();
  const d = document.getElementById('detail');
  const meta = allScans.find(s => s.id === id) || {};
  const upHosts = data.hosts.filter(h => h.up).length;
  const totalOpen = data.hosts.reduce((acc, h) => acc + h.ports.filter(p => p.state === 'open').length, 0);

  let html = `<h2>Scan #${data.scan_id} <span class="badge ${meta.status || 'unknown'}">${meta.status || ''}</span></h2>
    <div class="summary">
      <div class="stat"><span class="v">${upHosts}</span><span class="l">hosts up</span></div>
      <div class="stat"><span class="v">${data.hosts.length}</span><span class="l">total</span></div>
      <div class="stat"><span class="v">${totalOpen}</span><span class="l">open ports</span></div>
      <div class="stat"><span class="v">${(meta.elapsed_secs || 0).toFixed(2)}s</span><span class="l">elapsed</span></div>
    </div>`;

  // Sort hosts: up first, then by # open ports desc
  const sorted = [...data.hosts].sort((a, b) => {
    if (a.up !== b.up) return a.up ? -1 : 1;
    const ao = a.ports.filter(p => p.state === 'open').length;
    const bo = b.ports.filter(p => p.state === 'open').length;
    return bo - ao;
  });

  if (!sorted.length) { html += '<p class="empty">No hosts.</p>'; }
  for (const h of sorted) {
    const open = h.ports.filter(p => p.state === 'open').length;
    html += `<div class="host">
      <h3>${escape(h.ip)}${h.hostname ? ' (' + escape(h.hostname) + ')' : ''}
        <span class="pill">${h.up ? 'up' : 'down'}</span>
        <span class="pill">${open} open</span>
      </h3>
      <div class="muted">latency ${h.latency_secs.toFixed(3)}s</div>`;
    if (h.ports.length) {
      html += '<table><thead><tr><th>Port</th><th>Proto</th><th>State</th><th>Service</th></tr></thead><tbody>';
      for (const p of h.ports) {
        const stateClass = 'state-' + p.state.replace(/[|]/g, '');
        html += `<tr><td>${p.port}</td><td>${p.protocol}</td>
                 <td class="${stateClass}">${p.state}</td>
                 <td>${escape(p.service || '')}</td></tr>`;
      }
      html += '</tbody></table>';
    }
    html += '</div>';
  }
  d.innerHTML = html;
}

document.getElementById('search').addEventListener('input', renderScans);
loadScans();
setInterval(loadScans, 10000);
</script>
</body>
</html>
